<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="wf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .dot { animation: pulse 2s ease-in-out infinite; }
      .dot2 { animation: pulse 2s ease-in-out 0.5s infinite; }
      .acc-line { stroke-dasharray: 800; stroke-dashoffset: 800; animation: draw 1.8s ease-out 0.3s forwards; }
      @keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.9} }
      @keyframes draw  { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="10"/>

  <!-- Subtle grid -->
  <line x1="0"   y1="50"  x2="900" y2="50"  stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0"   y1="100" x2="900" y2="100" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0"   y1="150" x2="900" y2="150" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="180" y1="0"   x2="180" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="450" y1="0"   x2="450" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0"   x2="720" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Corner brackets -->
  <path d="M32,22 L32,14 L44,14" stroke="#667eea" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M868,22 L868,14 L856,14" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M32,178 L32,186 L44,186" stroke="#667eea" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M868,178 L868,186 L856,186" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Pulsing dots -->
  <circle class="dot"  cx="60"  cy="32" r="3.5" fill="#667eea"/>
  <circle class="dot2" cx="840" cy="32" r="3.5" fill="#a78bfa"/>
  <circle class="dot"  cx="450" cy="188" r="2.5" fill="#667eea" style="animation-delay:1s"/>

  <!-- Title -->
  <text
    font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="80"
    fill="url(#acc)"
    filter="url(#glow)"
    x="450" y="118"
    text-anchor="middle"
    letter-spacing="-2">HIRELY</text>

  <!-- Subtitle -->
  <text
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="14"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="5"
    x="450" y="148"
    text-anchor="middle">HR MANAGEMENT SYSTEM</text>

  <!-- Tag -->
  <text
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="10.5"
    fill="rgba(255,255,255,0.25)"
    letter-spacing="2.5"
    x="450" y="167"
    text-anchor="middle">AGILE · SCRUM · UI/UX · LARAVEL · FULL STACK</text>

  <!-- Animated accent underline -->
  <line class="acc-line" x1="60" y1="182" x2="840" y2="182" stroke="url(#acc)" stroke-width="1.5" opacity="0.45"/>
</svg>
