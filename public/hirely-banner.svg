<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#7c3aed"/>
      <stop offset="35%"  style="stop-color:#c2185b"/>
      <stop offset="65%"  style="stop-color:#e8572a"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .dot  { animation: pulse 2.2s ease-in-out infinite; }
      .dot2 { animation: pulse 2.2s ease-in-out 0.6s infinite; }
      .dot3 { animation: pulse 2.2s ease-in-out 1.2s infinite; }
      @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.85} }
      .acc-line { stroke-dasharray:800; stroke-dashoffset:800; animation:draw 2s ease-out 0.2s forwards; }
      @keyframes draw { to { stroke-dashoffset:0; } }
    </style>
  </defs>

  <rect width="900" height="200" fill="url(#bg)" rx="10"/>
  <rect width="900" height="200" fill="rgba(0,0,0,0.15)" rx="10"/>

  <!-- grid -->
  <line x1="0"   y1="50"  x2="900" y2="50"  stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0"   y1="100" x2="900" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0"   y1="150" x2="900" y2="150" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="180" y1="0"   x2="180" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="450" y1="0"   x2="450" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0"   x2="720" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- corner brackets -->
  <path d="M32,22 L32,14 L44,14"   stroke="rgba(255,255,255,0.55)" stroke-width="1.5" fill="none"/>
  <path d="M868,22 L868,14 L856,14" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" fill="none"/>
  <path d="M32,178 L32,186 L44,186" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" fill="none"/>
  <path d="M868,178 L868,186 L856,186" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" fill="none"/>

  <!-- pulsing dots -->
  <circle class="dot"  cx="60"  cy="32"  r="4" fill="rgba(255,255,255,0.8)"/>
  <circle class="dot2" cx="840" cy="32"  r="4" fill="rgba(255,255,255,0.8)"/>
  <circle class="dot3" cx="450" cy="188" r="3" fill="rgba(255,255,255,0.6)"/>

  <!-- title -->
  <text font-family="'Segoe UI','Arial Black',Arial,sans-serif" font-weight="900" font-size="82"
    fill="url(#text-grad)" filter="url(#glow)" x="450" y="118" text-anchor="middle" letter-spacing="-1">Hirely</text>

  <!-- subtitle -->
  <text font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="400"
    fill="rgba(255,255,255,0.78)" letter-spacing="4" x="450" y="150" text-anchor="middle">HR MANAGEMENT SYSTEM</text>

  <!-- tags -->
  <text font-family="'Segoe UI',Arial,sans-serif" font-size="10.5"
    fill="rgba(255,255,255,0.4)" letter-spacing="2.5" x="450" y="169" text-anchor="middle">AGILE · SCRUM · UI/UX · LARAVEL · FULL STACK</text>

  <!-- animated underline -->
  <line class="acc-line" x1="60" y1="182" x2="840" y2="182" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
</svg>
